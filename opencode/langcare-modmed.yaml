# LangCare MCP FHIR Server Configuration for ModMed
# ModMed uses OAuth2 password grant with custom dual-header authentication
# (Authorization: Bearer token + X-API-Key header)

# FHIR Server Configuration
fhir_server:
  # Use generic provider for ModMed's non-standard authentication
  provider: "generic"

  # ModMed FHIR endpoint (ema-dev environment)
  base_url: "https://stage.ema-api.com/ema-dev/firm/apiportal/ema/fhir/v2/Patient"

  # Authentication configuration
  auth:
    type: "bearer"
    # ModMed access token (obtained via OAuth2 password grant)
    token: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJmaGlyX1FmTGxvIiwidXJsUHJlZml4IjoiYXBpcG9ydGFsIiwidmVuZG9yIjoiZmhpcl9RZkxsb0BhcGlwb3J0YWwiLCJpc3MiOiJtb2RtZWQiLCJ0b2tlblR5cGUiOiJhY2Nlc3MiLCJwb2wiOiJjaGFuZ2VtZSIsImp0aSI6ImFlN2Y2ZDExYjc4MjQ1OGJiZDdmODliODMyNzYwYTNkIn0.QGct0vlefWf0ta-DXBvo4RgzDvgnA0lolEVbtRcyRJo"

  # Custom headers required by ModMed
  # ModMed requires BOTH Authorization header (set by bearer auth) AND x-api-key
  headers:
    X-API-Key: "Zt9tXPIgz17uxEU6gkZPWa3ZAFhZOqm04oEDHC1f"

  # Request timeout
  timeout: 30s

# MCP Server Configuration
mcp:
  name: "LangCare MCP FHIR Server - ModMed"
  version: "2.0.0"

# Transport Configuration
transport:
  # Enable stdio transport (for Claude Desktop)
  stdio: true

  # Optional: HTTP transport for remote access
  http:
    enabled: false
    port: 8080

# Logging configuration
logging:
  level: "info"
  format: "json"
  # Enable PHI scrubbing in logs (always keep this true in production)
  scrub_phi: true

# Security Configuration
security:
  # MCP client authentication tokens (comma-separated)
  # RECOMMENDED: Use MCP_AUTH_TOKENS environment variable for production
  # Example: export MCP_AUTH_TOKENS="token1,token2,token3"
  mcp_auth_tokens: ""

  # Rate limiting
  rate_limit:
    enabled: true
    rate: 100  # requests per second per IP
    burst: 200  # burst allowance
